name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(jq -r '.version' package.json)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create package zip
        run: |
          zip -r "com.mame8.animator-controller-ma-context-${{ steps.version.outputs.version }}.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "Website/*" \
            -x "README.md" \
            -x "CLAUDE.md" \
            -x ".gitignore"

      - name: Check if prerelease
        id: prerelease
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *-alpha* ]] || [[ "$VERSION" == *-beta* ]] || [[ "$VERSION" == *-rc* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "com.mame8.animator-controller-ma-context-${{ steps.version.outputs.version }}.zip"
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
